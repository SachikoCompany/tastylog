name: "infra preview & deploy"

on:
  push:
    branches:
      - main
    paths:
      - 10_infra/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.6
  TF_PROJECT: "tastylog"
  TF_ENVIRONMENT: "dev"

defaults:
  run:
    shell: bash
    working-directory: "10_infra/"

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    outputs:
      TF_PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform format
        run: terraform fmt -check
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform init
        run: terraform init -no-color
      - name: Terraform validate
        run: terraform validate -no-color
      - name: Terraform plan
        id: plan
        continue-on-error: true
        env:
          TF_VAR_username: ${{ secrets.MYSQL_USERNAME }}
          TF_VAR_password: ${{ secrets.MYSQL_PASSWORD }}
        run: terraform plan -var "project=${{ env.TF_PROJECT }}" -var "environment=${{ env.TF_ENVIRONMENT }}" -input=false -no-color -detailed-exitcode
      - name: Slack notify
        uses: slackapi/slack-github-action@v3.0.3
        with:
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          method: chat.postMessage
          payload: |
            {
              "channel": "C0B4AC1P5NV",
              "attachments": [
                {
                  "color": "#0068B7",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "Request for approve",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    }
                  ]
                }
              ]
            }
